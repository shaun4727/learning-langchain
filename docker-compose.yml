services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env  # Loads all variables (DATABASE_URL, keys, etc.) directly from your file
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agentic_network  # Ensures the API can talk to the database

  db:
    image: pgvector/pgvector:pg16
    container_name: agentic_postgres_db
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentic_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: agentic_pgadmin_ui
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mononsoft.com
      PGADMIN_DEFAULT_PASSWORD: root
    depends_on:
      - db
    networks:
      - agentic_network

volumes:
  postgres_data:

networks:
  agentic_network:
    driver: bridge